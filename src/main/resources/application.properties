# SnapAdmin Configuration
snapadmin.enabled=true
snapadmin.baseUrl=admin
snapadmin.modelsPackage=tech.ailef.snapadmin.internal.model
snapadmin.ormType=MYBATIS_PLUS

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:snapadmin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration (for backward compatibility, can be commented out if not needed)
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# MyBatis-Plus Configuration
mybatis-plus.mapper.scan=tech.ailef.snapadmin.internal.mapper
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.configuration.map-underscore-to-camel-case=true
